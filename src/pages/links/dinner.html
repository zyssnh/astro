
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今晚吃什么 🍜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  h1 {
    font-size: 2.2em;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 0.9em;
    margin-bottom: 30px;
  }

  .result-box {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 24px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .result-emoji {
    font-size: 3.5em;
    margin-bottom: 12px;
    animation: none;
  }

  .result-emoji.rolling {
    animation: roll 0.1s steps(1) infinite;
  }

  @keyframes roll {
    0% { transform: translateY(-2px); }
    50% { transform: translateY(2px); }
    100% { transform: translateY(-2px); }
  }

  .result-text {
    font-size: 2em;
    font-weight: 700;
    color: #ffd700;
  }

  .result-category {
    font-size: 0.85em;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .btn-primary {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(247,151,30,0.4);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85em;
    cursor: pointer;
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .tag:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .tag.active {
    background: rgba(255,210,0,0.2);
    color: #ffd700;
    border-color: rgba(255,210,0,0.4);
  }

  .history {
    margin-top: 20px;
    text-align: left;
  }

  .history-title {
    color: rgba(255,255,255,0.4);
    font-size: 0.8em;
    margin-bottom: 8px;
  }

  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .history-item {
    font-size: 0.8em;
    color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.04);
    padding: 4px 10px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>今晚吃什么</h1>
  <p class="subtitle">把命运交给随机 🎲</p>

  <div class="result-box">
    <div class="result-emoji" id="emoji">🤔</div>
    <div class="result-text" id="result">还没想好</div>
    <div class="result-category" id="category"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="pick()">🎰 随机抽取</button>
    <button class="btn btn-secondary" onclick="openCustom()">✏️ 自定义</button>
  </div>

  <div class="categories" id="categories"></div>

  <div class="history" id="historySection" style="display:none;">
    <div class="history-title">📋 历史记录</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
const foodDB = [
  { name: '麻辣烫',  emoji: '🍲', cat: '中餐' },
  { name: '火锅',    emoji: '🫕', cat: '中餐' },
  { name: '兰州拉面', emoji: '🍜', cat: '中餐' },
  { name: '黄焖鸡',   emoji: '🍗', cat: '中餐' },
  { name: '煲仔饭',   emoji: '🍚', cat: '中餐' },
  { name: '螺蛳粉',   emoji: '🍝', cat: '中餐' },
  { name: '酸菜鱼',   emoji: '🐟', cat: '中餐' },
  { name: '煎饼果子', emoji: '🫓', cat: '中餐' },
  { name: '烤串',    emoji: '🍢', cat: '中餐' },
  { name: '盖浇饭',   emoji: '🍛', cat: '中餐' },
  { name: '大盘鸡',   emoji: '🥘', cat: '中餐' },
  { name: '水煮鱼',   emoji: '🐠', cat: '中餐' },
  { name: '披萨',    emoji: '🍕', cat: '西餐' },
  { name: '汉堡',    emoji: '🍔', cat: '西餐' },
  { name: '牛排',    emoji: '🥩', cat: '西餐' },
  { name: '意面',    emoji: '🍝', cat: '西餐' },
  { name: '沙拉',    emoji: '🥗', cat: '西餐' },
  { name: '三明治',   emoji: '🥪', cat: '西餐' },
  { name: '寿司',    emoji: '🍣', cat: '日料' },
  { name: '拉面',    emoji: '🍜', cat: '日料' },
  { name: '炸猪排',   emoji: '🐷', cat: '日料' },
  { name: '天妇罗',   emoji: '🍤', cat: '日料' },
  { name: '鳗鱼饭',   emoji: '🍱', cat: '日料' },
  { name: '乌冬面',   emoji: '🍲', cat: '日料' },
  { name: '石锅拌饭', emoji: '🫕', cat: '韩餐' },
  { name: '韩式炸鸡', emoji: '🍗', cat: '韩餐' },
  { name: '烤肉',    emoji: '🥓', cat: '韩餐' },
  { name: '部队锅',   emoji: '🫕', cat: '韩餐' },
  { name: '冬阴功',   emoji: '🦐', cat: '东南亚' },
  { name: '越南河粉', emoji: '🍜', cat: '东南亚' },
  { name: '咖喱饭',   emoji: '🍛', cat: '东南亚' },
  { name: '沙县小吃', emoji: '🥟', cat: '小吃' },
  { name: '麻辣拌',   emoji: '🥢', cat: '小吃' },
  { name: '凉皮',    emoji: '🥡', cat: '小吃' },
  { name: '饺子',    emoji: '🥟', cat: '小吃' },
  { name: '麻辣香锅', emoji: '🥘', cat: '中餐' },
  { name: '米线',    emoji: '🍜', cat: '小吃' },
]

let activeCat = '全部'
let rolling = false
let history = JSON.parse(localStorage.getItem('dinnerHistory') || '[]')

function renderCategories() {
  const cats = ['全部', ...new Set(foodDB.map(f => f.cat))]
  document.getElementById('categories').innerHTML = cats.map(c =>
    `<span class="tag${c === activeCat ? ' active' : ''}" onclick="setCat('${c}')">${c}</span>`
  ).join('')
}

function setCat(cat) {
  activeCat = cat
  renderCategories()
}

function getPool() {
  return activeCat === '全部' ? foodDB : foodDB.filter(f => f.cat === activeCat)
}

function pick() {
  if (rolling) return
  rolling = true

  const pool = getPool()
  const emojiEl = document.getElementById('emoji')
  const resultEl = document.getElementById('result')
  const catEl = document.getElementById('category')

  emojiEl.classList.add('rolling')
  resultEl.textContent = '正在思考...'
  catEl.textContent = ''

  let count = 0
  const total = 15
  const interval = setInterval(() => {
    const r = pool[Math.floor(Math.random() * pool.length)]
    emojiEl.textContent = r.emoji
    resultEl.textContent = r.name
    count++

    if (count >= total) {
      clearInterval(interval)
      emojiEl.classList.remove('rolling')

      const final = pool[Math.floor(Math.random() * pool.length)]
      emojiEl.textContent = final.emoji
      resultEl.textContent = final.name
      catEl.textContent = final.cat

      history.unshift({ ...final, time: new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }) })
      if (history.length > 20) history.pop()
      localStorage.setItem('dinnerHistory', JSON.stringify(history))
      renderHistory()
      rolling = false
    }
  }, 80)
}

function renderHistory() {
  const section = document.getElementById('historySection')
  const list = document.getElementById('historyList')
  if (history.length === 0) {
    section.style.display = 'none'
    return
  }
  section.style.display = 'block'
  list.innerHTML = history.slice(0, 10).map(h =>
    `<span class="history-item">${h.emoji} ${h.name} <span style="opacity:0.5">${h.time}</span></span>`
  ).join('')
}

function openCustom() {
  const name = prompt('输入你想加的食物名称：')
  if (name && name.trim()) {
    const emoji = prompt('给它配个 emoji（例如 🍕）：', '🍽️')
    foodDB.push({ name: name.trim(), emoji: emoji || '🍽️', cat: '自定义' })
    renderCategories()
  }
}

renderCategories()
renderHistory()
</script>
</body>
</html>
